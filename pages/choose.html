}

  .carousel-btn {

    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);

  }

  .carousel-dots { 
    display: flex; 
    gap: 6px; }

  .carousel-dot {
    width: px;

    background: rgba(255,255,255,0.2);

  }
  .carousel-dot.active { background: #FF86F6; width: 18px; border-radius: 3px; }

.choose-btn-wrap { 
  position:absolute; 
  bottom:10%;

}
.choose-btn {

  font-weight:1000; 
  font-size:clamp(20px,1.5vw,21px);
  text-transform:uppercase; 
  letter-spacing:.1em; 
  color:#1a0800;
  background:linear-gradient(90deg,#f5a020 0%,#c5f055 100%);

  }

  
.choose-btn.ready { opacity: 1; pointer-events: all; }
  
    @keyframes scroll {
      from { transform: translateX(0); }

    }

</head>
<body>

<!-- CHOOSE CHARACTER -->
<section id="screen-choose" class="screen active">
  <h1 class="section-title float-text">Choose Your Character</h1>
  <p class="section-sub">Pick the SYDE student whose journey you want to follow</p>

  <div class="carousel-wrapper">
    <div class="carousel-track-outer">
      <div class="carousel-track" id="carouselTrack"></div>
    </div>
    <div class="carousel-controls">
      <button class="carousel-btn" id="prevBtn">&#8592;</button>
      <div class="carousel-dots" id="carouselDots"></div>
      <button class="carousel-btn" id="nextBtn">&#8594;</button>
    </div>
  </div>

  <canvas id="bgCanvas"></canvas>

  <button class="choose-btn" id="chooseBtn">Start Adventure</button>
</section>



<script>
const characters = [
  { img: "images/Ian.png", name: "Ian", bio: "Helped to develop this website!" },
  { img: "images/Nandika.png", name: "Nandika", bio: "Helped to develop this website!" },
  { img: "images/Tonia.png", name: "Tonia", bio: "Helped to develop this website!" },
  { img: "images/Rachael.png", name: "Rachael", bio: "Helped to develop this website!" },
  { img: "images/Luna.png", name: "Luna", bio: "Helped to develop this website!" },
  { img: "images/Nikki.png", name: "Nikki", bio: "Helped to develop this website!" },
  { img: "images/Marwa.png", name: "Marwa", bio: "Helped to develop this website!" },
  {img: "images/Linda.png", name: "Linda", bio: "Helped to develop this website!" },
  { img: "images/Sara.png", name: "Sara", bio: "Helped to develop this website!" },
  { img: "images/Joy.png", name: "Joy", bio: "Helped to develop this website!" },
  { img: "images/Seohee.png", name: "Seohee", bio: "Made this beta ver! <3" },
];


const track = document.getElementById('carouselTrack');

let scrollX = 0;
let autoScroll;
let selectedChar = null;

const speed = 0.5;
const cardW = 260;


function buildCarousel() {
  track.innerHTML = '';

  const all = [...characters, ...characters]; // duplicate once

  all.forEach((c, i) => {
    const realIndex = i % characters.length;

    const card = document.createElement('div');
    card.className = 'char-card';

    if (selectedChar === realIndex) {
      card.classList.add('selected');
    }

    card.innerHTML = `
    <div class="char-avatar">
      <img src="${c.img}" alt="${c.name}">
    </div>
      <div class="char-name">${c.name}</div>
      <div class="char-bio">${c.bio}</div>
      <div class="char-select-badge">SELECTED</div>
    `;

    card.onclick = () => {
      selectedChar = realIndex;
      updateSelection();
      updateChooseBtn();
    };

    track.appendChild(card);
  });
}

// Update selection highlight
function updateSelection() {
  const cards = track.querySelectorAll('.char-card');

  cards.forEach((card, i) => {
    const realIndex = i % characters.length;

    card.classList.toggle('selected', realIndex === selectedChar);
  });
}

// Movement
function moveCarousel() {
  scrollX += speed;

  const totalWidth = cardW * characters.length;

  if (scrollX >= totalWidth) {
    scrollX = 0;
  }

  track.style.transform = `translateX(-${scrollX}px)`;
}

// Auto scroll
function startAutoScroll() {
  autoScroll = setInterval(moveCarousel, 16);
}

// Stop
function stopAutoScroll() {
  clearInterval(autoScroll);
}

// BUTTONS
document.getElementById('nextBtn').onclick = () => {
  stopAutoScroll();
  scrollX += cardW;
  moveCarousel();
};

document.getElementById('prevBtn').onclick = () => {
  stopAutoScroll();
  scrollX -= cardW;

  if (scrollX < 0) {
    scrollX = cardW * (characters.length - 1);
  }

  moveCarousel();
};

// Hover pause
track.addEventListener('mouseenter', stopAutoScroll);
track.addEventListener('mouseleave', startAutoScroll);


function updateChooseBtn() {
  document.getElementById('chooseBtn')
    .classList.toggle('ready', selectedChar !== null);
}


buildCarousel();
startAutoScroll();

//button link to 
chooseBtn.onclick = () => {
  if (selectedChar !== null) {
    window.location.href = `adventure.html?char=${selectedChar}`;
  }
};

//stars in bg
function drawStar(ctx, cx, cy, sH, sV, a, config) {
  const { glow, colorFn } = config;

  // glow background
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, sH * 2.2);

  glow.forEach((g, i) => {
    bg.addColorStop(g.stop, g.color(a));
  });

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, sH * 2.2, 0, Math.PI * 2);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.restore();

  // star layers
  for (let i = 80; i >= 0; i--) {
    const t = i / 80;
    const sh = sH * t;
    const sv = sV * t;

    const [r, g, b] = colorFn(t);

    const op = a * 0.55 * (1 - Math.pow(t, 0.8));
    if (op <= 0.002) continue;

    const wx = sh * 0.08;
    const wy = sv * 0.08;

    ctx.save();
    ctx.globalAlpha = op;
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    ctx.beginPath();
    ctx.moveTo(cx, cy - sv);
    ctx.quadraticCurveTo(cx + wx, cy - wy, cx + sh, cy);
    ctx.quadraticCurveTo(cx + wx, cy + wy, cx, cy + sv);
    ctx.quadraticCurveTo(cx - wx, cy + wy, cx - sh, cy);
    ctx.quadraticCurveTo(cx - wx, cy - wy, cx, cy - sv);

    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}
const greenStar = {
  glow: [
    { stop: 0, color: a => `rgba(90,40,100,${a * 0.28})` },
    { stop: 0.35, color: a => `rgba(30,10,150,${a * 0.14})` },
    { stop: 0.7, color: a => `rgba(200,80,35,${a * 0.06})` },
    { stop: 1, color: () => `rgba(10,150,60,0)` }
  ],

  colorFn: t => [
    58 + (180 - 58) * t,
    79 + (240 - 79) * t,
    212 + (50 - 212) * t
  ]
};
const purpleStar = {
  glow: [
    { stop: 0, color: a => `rgba(120,40,200,${a * 0.3})` },
    { stop: 1, color: () => `rgba(0,0,0,0)` }
  ],

  colorFn: t => [
    80 + (130 - 80) * t,
    30 + (60 - 30) * t,
    255
  ]
};
const pinkStar = {
  glow: [
    { stop: 0, color: a => `rgba(200,60,130,${a * 0.28})` },
    { stop: 1, color: () => `rgba(0,0,0,0)` }
  ],

  colorFn: t => [
    255,
    60 + (150 - 60) * t,
    180 + (80 - 180) * t
  ]
};

function renderBg() {
  const c = document.getElementById('bgCanvas');
  const W = c.width = c.offsetWidth;
  const H = c.height = c.offsetHeight;
  const ctx = c.getContext('2d');

  ctx.clearRect(0, 0, W, H);

  const sH = Math.min(W, H) * 0.3;
  const sV = Math.min(W, H) * 0.36;

  ctx.filter = 'blur(14px)';

  drawStar(ctx, W * 0.1, H * 0.5, sH, sV, 1, greenStar);
  drawStar(ctx, W * 0.88, H * 0.04, sH, sV, 1, purpleStar);
  drawStar(ctx, W * 0.85, H * 0.82, sH * 0.85, sV * 0.85, 1, pinkStar);

  ctx.filter = 'none';
}

window.addEventListener('load',()=>{renderBg();drawCoop();drawGender();});
window.addEventListener('resize',()=>{renderBg();drawCoop();drawGender();});

</script>
</body>
</html>
