<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Personality - SYDE29</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0c0e15; color:#EAEBED; font-family:'Barlow','Arial Black',sans-serif; }

#bgCanvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; opacity:0.55; }

.topbar { position:fixed; top:28px; left:36px; z-index:3; display:flex; align-items:baseline; gap:12px; }
.logo { font-size:clamp(20px,2vw,28px); font-weight:900; text-transform:uppercase; letter-spacing:0.04em; }
.logo .accent { color:#FF86F6; }
.crumbs { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(234,235,237,0.5); }

.page { position:relative; z-index:1; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }

.step { font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#C5FF79; margin-bottom:14px; }
.soon { font-size:clamp(44px,11vw,140px); font-weight:900; text-transform:uppercase; letter-spacing:0.01em; line-height:0.95;
        background:linear-gradient(90deg,#FF86F6 0%,#c5f055 100%); -webkit-background-clip:text; background-clip:text; color:transparent; }
.blurb { margin-top:18px; font-size:14px; letter-spacing:0.06em; color:rgba(234,235,237,0.55); max-width:440px; line-height:1.6; }

.continue-wrap { position:fixed; bottom:1.25rem; right:1.5rem; z-index:3; }
.continue-btn { font-family:'Barlow','Arial Black',sans-serif; font-weight:1000; font-size:clamp(18px,1.5vw,21px); text-transform:uppercase; letter-spacing:0.1em; color:#1a0800; background:linear-gradient(90deg,#f5a020 0%,#c5f055 100%); border:none; border-radius:200px; padding:0.55em 1.9em; cursor:pointer; transition:all 0.25s ease; }
.continue-btn:hover { background:#fff; color:#12151B; }
.back-link { position:fixed; bottom:1.6rem; left:1.6rem; z-index:3; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(234,235,237,0.5); text-decoration:none; transition:color 0.2s ease; }
.back-link:hover { color:#FF86F6; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="topbar">
  <div class="logo">A Look <span class="accent">InSYDE</span></div>
  <div class="crumbs">/ Personality</div>
</div>

<a href="createcharacter.html" class="back-link">&larr; Back</a>

<div class="page">
  <div class="step">Step 2 &mdash; About You</div>
  <div class="soon">Coming Soon</div>
  <div class="blurb">Hobbies, fun facts, your whole vibe &mdash; this page is still in the works.</div>
</div>

<div class="continue-wrap">
  <button class="continue-btn" id="continueBtn">Continue</button>
</div>

<script>
document.getElementById('continueBtn').onclick = () => { window.location.href = 'choose.html'; };

function drawStar(ctx, cx, cy, sH, sV, a, config) {
  const { glow, colorFn } = config;
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, sH * 2.2);
  glow.forEach(g => bg.addColorStop(g.stop, g.color(a)));
  ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, sH * 2.2, 0, Math.PI * 2); ctx.fillStyle = bg; ctx.fill(); ctx.restore();
  for (let i = 80; i >= 0; i--) {
    const t = i / 80, sh = sH * t, sv = sV * t;
    const [r, g, b] = colorFn(t);
    const op = a * 0.55 * (1 - Math.pow(t, 0.8));
    if (op <= 0.002) continue;
    const wx = sh * 0.08, wy = sv * 0.08;
    ctx.save(); ctx.globalAlpha = op; ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.moveTo(cx, cy - sv);
    ctx.quadraticCurveTo(cx + wx, cy - wy, cx + sh, cy);
    ctx.quadraticCurveTo(cx + wx, cy + wy, cx, cy + sv);
    ctx.quadraticCurveTo(cx - wx, cy + wy, cx - sh, cy);
    ctx.quadraticCurveTo(cx - wx, cy - wy, cx, cy - sv);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}
const greenStar = { glow:[{stop:0,color:a=>`rgba(90,40,100,${a*0.28})`},{stop:0.35,color:a=>`rgba(30,10,150,${a*0.14})`},{stop:0.7,color:a=>`rgba(200,80,35,${a*0.06})`},{stop:1,color:()=>`rgba(10,150,60,0)`}], colorFn:t=>[58+(180-58)*t,79+(240-79)*t,212+(50-212)*t] };
const purpleStar = { glow:[{stop:0,color:a=>`rgba(120,40,200,${a*0.3})`},{stop:1,color:()=>`rgba(0,0,0,0)`}], colorFn:t=>[80+(130-80)*t,30+(60-30)*t,255] };
const pinkStar = { glow:[{stop:0,color:a=>`rgba(200,60,130,${a*0.28})`},{stop:1,color:()=>`rgba(0,0,0,0)`}], colorFn:t=>[255,60+(150-60)*t,180+(80-180)*t] };
function renderBg() {
  const c = document.getElementById('bgCanvas');
  const W = c.width = c.offsetWidth, H = c.height = c.offsetHeight;
  const ctx = c.getContext('2d'); ctx.clearRect(0, 0, W, H);
  const sH = Math.min(W, H) * 0.3, sV = Math.min(W, H) * 0.36;
  ctx.filter = 'blur(14px)';
  drawStar(ctx, W*0.1, H*0.5, sH, sV, 1, greenStar);
  drawStar(ctx, W*0.88, H*0.04, sH, sV, 1, purpleStar);
  drawStar(ctx, W*0.85, H*0.82, sH*0.85, sV*0.85, 1, pinkStar);
  ctx.filter = 'none';
}
window.addEventListener('load', renderBg);
window.addEventListener('resize', renderBg);
</script>
</body>
</html>
