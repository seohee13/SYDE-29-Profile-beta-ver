<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - SYDE29</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0c0e15;
  color: #EAEBED;
  font-family: 'Barlow', 'Arial Black', sans-serif;
}

#bgCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0.55;
}

.page {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 20px;
}

.topbar {
  position: absolute;
  top: 28px;
  left: 36px;
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.logo {
  font-size: clamp(20px, 2vw, 28px);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.logo .accent { color: #FF86F6; }

.crumbs {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(234,235,237,0.5);
}

.login-container {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 40px 36px;
  backdrop-filter: blur(10px);
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.login-header h1 {
  font-size: clamp(24px, 3vw, 32px);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}

.login-header p {
  font-size: 13px;
  color: rgba(234,235,237,0.5);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(234,235,237,0.6);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #EAEBED;
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  font-weight: 400;
  transition: all 0.2s ease;
}

.form-input::placeholder {
  color: rgba(234,235,237,0.3);
}

.form-input:focus {
  outline: none;
  border-color: #FF86F6;
  background: rgba(255,255,255,0.08);
}

.login-btn {
  width: 100%;
  padding: 16px 24px;
  margin-top: 8px;
  font-family: 'Barlow', 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #1a0800;
  background: linear-gradient(90deg, #f5a020 0%, #c5f055 100%);
  border: none;
  border-radius: 200px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.login-btn:hover {
  background: #fff;
  color: #12151B;
}

.divider {
  display: flex;
  align-items: center;
  margin: 28px 0;
  gap: 16px;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.1);
}

.divider span {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(234,235,237,0.4);
}

.uw-login-btn {
  width: 100%;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-family: 'Barlow', 'Arial Black', sans-serif;
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #EAEBED;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 200px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.uw-login-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.25);
}

.uw-logo {
  width: 24px;
  height: 24px;
  background: #FFD700;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 12px;
  color: #1a0800;
}

.login-footer {
  text-align: center;
  margin-top: 28px;
}

.login-footer p {
  font-size: 13px;
  color: rgba(234,235,237,0.5);
}

.login-footer a {
  color: #FF86F6;
  text-decoration: none;
  font-weight: 700;
  transition: color 0.2s ease;
}

.login-footer a:hover {
  color: #C5FF79;
}

.forgot-password {
  display: block;
  text-align: right;
  font-size: 12px;
  color: rgba(234,235,237,0.5);
  text-decoration: none;
  margin-top: -12px;
  margin-bottom: 16px;
  transition: color 0.2s ease;
}

.forgot-password:hover {
  color: #FF86F6;
}

.error-message {
  display: none;
  padding: 12px 16px;
  background: rgba(255,86,86,0.15);
  border: 1px solid rgba(255,86,86,0.3);
  border-radius: 8px;
  color: #ff6b6b;
  font-size: 13px;
  margin-bottom: 16px;
  text-align: center;
}

/* mobile */
@media (max-width: 480px) {
  .login-container {
    padding: 32px 24px;
  }
  .topbar {
    left: 20px;
    top: 20px;
  }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="page">
  <div class="topbar">
    <div class="logo">A Look <span class="accent">InSYDE</span></div>
    <div class="crumbs">/ Login</div>
  </div>

  <div class="login-container">
    <div class="login-header">
      <h1>Welcome Back</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          placeholder="you@uwaterloo.ca"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="Enter your password"
          required
        />
      </div>

      <a href="#" class="forgot-password">Forgot password?</a>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>
</div>

<script>
function drawStar(ctx, cx, cy, sH, sV, a, config) {
  const { glow, colorFn } = config;
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, sH * 2.2);
  glow.forEach(g => bg.addColorStop(g.stop, g.color(a)));
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, sH * 2.2, 0, Math.PI * 2);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.restore();
  for (let i = 80; i >= 0; i--) {
    const t = i / 80;
    const sh = sH * t, sv = sV * t;
    const [r, g, b] = colorFn(t);
    const op = a * 0.55 * (1 - Math.pow(t, 0.8));
    if (op <= 0.002) continue;
    const wx = sh * 0.08, wy = sv * 0.08;
    ctx.save();
    ctx.globalAlpha = op;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.moveTo(cx, cy - sv);
    ctx.quadraticCurveTo(cx + wx, cy - wy, cx + sh, cy);
    ctx.quadraticCurveTo(cx + wx, cy + wy, cx, cy + sv);
    ctx.quadraticCurveTo(cx - wx, cy + wy, cx - sh, cy);
    ctx.quadraticCurveTo(cx - wx, cy - wy, cx, cy - sv);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

const greenStar = {
  glow: [
    { stop: 0, color: a => `rgba(90,40,100,${a*0.28})` },
    { stop: 0.35, color: a => `rgba(30,10,150,${a*0.14})` },
    { stop: 0.7, color: a => `rgba(200,80,35,${a*0.06})` },
    { stop: 1, color: () => `rgba(10,150,60,0)` }
  ],
  colorFn: t => [58 + (180-58)*t, 79 + (240-79)*t, 212 + (50-212)*t]
};

const purpleStar = {
  glow: [
    { stop: 0, color: a => `rgba(120,40,200,${a*0.3})` },
    { stop: 1, color: () => `rgba(0,0,0,0)` }
  ],
  colorFn: t => [80 + (130-80)*t, 30 + (60-30)*t, 255]
};

const pinkStar = {
  glow: [
    { stop: 0, color: a => `rgba(200,60,130,${a*0.28})` },
    { stop: 1, color: () => `rgba(0,0,0,0)` }
  ],
  colorFn: t => [255, 60 + (150-60)*t, 180 + (80-180)*t]
};

function renderBg() {
  const c = document.getElementById('bgCanvas');
  const W = c.width = c.offsetWidth;
  const H = c.height = c.offsetHeight;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const sH = Math.min(W, H) * 0.3;
  const sV = Math.min(W, H) * 0.36;
  ctx.filter = 'blur(14px)';
  drawStar(ctx, W * 0.1, H * 0.5, sH, sV, 1, greenStar);
  drawStar(ctx, W * 0.88, H * 0.04, sH, sV, 1, purpleStar);
  drawStar(ctx, W * 0.85, H * 0.82, sH * 0.85, sV * 0.85, 1, pinkStar);
  ctx.filter = 'none';
}

window.addEventListener('load', renderBg);
window.addEventListener('resize', renderBg);

const loginForm = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');

loginForm.addEventListener('submit', (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  
  if (!email || !password) {
    errorMsg.textContent = 'Please fill in all fields';
    errorMsg.style.display = 'block';
    return;
  }
  
  // Get stored users and validate credentials
  const users = JSON.parse(localStorage.getItem('syde29_users') || '[]');
  const user = users.find(u => u.email === email);
  
  if (!user) {
    errorMsg.textContent = 'No account found with this email. Please sign up first.';
    errorMsg.style.display = 'block';
    return;
  }
  
  if (user.password !== password) {
    errorMsg.textContent = 'Incorrect password. Please try again.';
    errorMsg.style.display = 'block';
    return;
  }
  
  localStorage.setItem('syde29_current_user', JSON.stringify(user));
  window.location.href = 'choose.html';
});
</script>

</body>
</html>
